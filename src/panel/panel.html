<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ALT-DEV TOOLS</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <!--
    Shell only — all panel markup is generated at runtime by TypeScript
    component functions imported in panel.ts.

    Architecture:
      src/panel/components/
        tab-bar.ts                  <- TabBar widget
        widgets/icons.ts            <- SVG icon helpers
        panels/
          elements-panel.ts         <- Elements panel
          console-panel.ts          <- Console panel
          network-panel.ts          <- Network panel
          sources-panel.ts          <- Sources panel
          application-panel.ts      <- Application panel
  -->
  <div id="app"></div>
  <script type="module" src="./panel.ts"></script>
</body>
</html>
